name = "router"
main = "index.js"
compatibility_date = "2024-09-23"

# One route per redirect source. Only these exact hostnames are intercepted.
# Add a new route here whenever you add a new source in redirects.txt.
# DNS must have a proxied dummy record for each hostname listed.
routes = [
  { pattern = "inds.space/*",     zone_name = "inds.space" },
  { pattern = "old.inds.space/*", zone_name = "inds.space" },
  { pattern = "go.inds.space/*",  zone_name = "inds.space" },
]
