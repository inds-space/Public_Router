name = "router"
main = "index.js"
compatibility_date = "2024-09-23"
workers_dev = false

# Custom domains — CF auto-issues SSL certs, no dummy DNS A records needed.
# Add a new [[routes]] block (with custom_domain = true) for each source in redirects.txt.

[[routes]]
pattern = "inds.space"
custom_domain = true

[[routes]]
pattern = "old.inds.space"
custom_domain = true

[[routes]]
pattern = "go.inds.space"
custom_domain = true
