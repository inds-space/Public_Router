<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #e5e5e5;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: #fff;
      letter-spacing: -4px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #555;
      margin: 1.5rem auto;
      border-radius: 2px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.95rem;
      color: #888;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a.btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #fff;
      color: #0d0d0d;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      border-radius: 6px;
      transition: opacity 0.15s;
    }

    a.btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <div class="divider"></div>
    <h1>Page not found</h1>
    <p>The address you followed doesn't exist or has moved. Check the URL or head back to the main site.</p>
    <!-- Replace the href with your actual domain -->
    <a class="btn" href="https://www.inds.space">Back to website</a>
  </div>
</body>
</html>
